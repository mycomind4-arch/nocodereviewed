
<h2 class="sr-only">Supplemental prompt library for No-Code Empire — 27 additional prompts covering admin dashboards, remaining microtools, SEO infrastructure, and operations.</h2>

<style>

<script>
const prompts2 = [
  {
    phase:"Phase A — infrastructure gaps (blockers from list 1)",
    items:[
      {n:29,color:"num-red",cat:"infra",title:"Tools database seed — 100 tools",what:"Site 1 renders nothing without data. You need 50–100 tools in Supabase before the first page loads. This is the most overlooked prerequisite.",prompt:"Create the complete seed dataset for the No-Code Empire tools database. I need 100 no-code tools across all 10 site categories: website builders, app builders, automation tools, database/backend tools, ecommerce platforms, AI integration tools, agency tools, analytics/SEO tools, design/UI tools, and solopreneur tools. For each tool provide: name, slug, tagline, website_url, affiliate_url (use the program from the affiliate directory in the spec), category array, rating_overall (1–5, be realistic), rating_ease, rating_features, rating_pricing, rating_support, verdict (1 sentence), pros array (3–5 items), cons array (2–4 items), pricing_tiers as JSONB (free tier if exists, then paid tiers with monthly price and key limits), best_for array (2–3 audience descriptions). Output as a single SQL INSERT statement I can run directly in Supabase. Prioritize tools that have active affiliate programs from the spec's affiliate directory."},
      {n:30,color:"num-red",cat:"infra",title:"Admin dashboard — universal spec",what:"Every site needs an /admin route. One spec, adapted per site. Article management, tool management, affiliate stats, keyword queue viewer.",prompt:"Build the complete admin dashboard component for the No-Code Empire sites. The dashboard lives at /admin, protected by Supabase Auth. It must include: (1) Overview tab — today's pageviews (GA4 API), new subscribers today, affiliate clicks today, articles published this week, current sponsored slot revenue, and a 30-day sparkline for each metric. (2) Articles tab — table of all articles with status (published/draft/flagged), word count, affiliate link count, last-updated date, and buttons to edit/unpublish/flag for refresh. Filter by status and category. (3) Tools tab — all tools in the database with last-price-update date, a 'Needs refresh' flag if >30 days old, affiliate URL status (active/broken), and inline edit for rating and pricing. (4) Keyword queue tab — the ranked keyword queue from Agent 1, showing keyword, site target, priority score, volume, KD, and status (pending/in_progress/published), with ability to re-prioritize or remove. (5) Affiliate clicks tab — clicks by tool, article, and date range, with estimated revenue based on known commission rates. (6) Sponsored slots tab — active/expiring/available slots across all sites with revenue totals. Build as a reusable JSX component using Tailwind utility classes with Supabase client for all data fetching."},
      {n:31,color:"num-red",cat:"infra",title:"Vercel deployment config — all 10 sites",what:"Environment variables, build settings, domain routing, and edge config for the full network. One wrong env var kills affiliate tracking across a site.",prompt:"Write the complete Vercel deployment configuration for the No-Code Empire 10-site network. For each site type (Lovable/Vite export, Next.js, Astro), provide: (1) the vercel.json configuration file with correct build commands, output directory, and framework preset, (2) the full list of environment variables required — SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_KEY, WEBHOOK_SECRET, RESEND_API_KEY, GEMINI_API_KEY, GA4_MEASUREMENT_ID, INDEXNOW_KEY, and any site-specific vars — with notes on which are public vs private, (3) the custom domain DNS configuration steps (A record vs CNAME, www redirect, SSL), (4) the Vercel project settings for: Node.js version, build caching strategy, and serverless function region (recommend us-west-2 for lowest latency to Supabase), (5) a deployment checklist to run before going live on each new site. Include the specific steps to migrate a Lovable export to Vercel in under 10 minutes."},
      {n:32,color:"num-red",cat:"infra",title:"Error handling — 404, 500, form validation",what:"Broken error pages hurt SEO and user trust. Every form needs graceful failure. This is always skipped and always regretted.",prompt:"Build the complete error handling system for the No-Code Empire sites. Deliverables: (1) A 404 page component that includes a search bar querying the articles table, the top 6 most-viewed tools as cards, a 'Browse by category' grid, and a message that doesn't feel like a dead end. (2) A 500 error page that logs the error to a site_errors Supabase table (columns: url, error_message, user_agent, timestamp) and shows a friendly message with a link back to the homepage. (3) A universal form error handler for all webhook-connected forms (newsletter signup, submit-a-tool, sponsored listing inquiry) that: validates client-side before submitting, handles network failures with a retry button, shows specific field-level error messages, and never loses the user's input on failure. (4) A graceful API failure component for all interactive microtools — when a Gemini or external API call fails, show a helpful fallback state rather than a broken UI. Include the Supabase error logging table schema and the client-side retry logic."},
      {n:33,color:"num-amber",cat:"infra",title:"GDPR + affiliate disclosure system",what:"Affiliate disclosure on every page with affiliate links is legally required and a common TOS violation that kills PartnerStack/Impact accounts.",prompt:"Build the complete GDPR and affiliate compliance system for the No-Code Empire network. Deliverables: (1) A cookie consent banner component that: appears on first visit, blocks GA4 and any tracking scripts until consent is given, stores consent in localStorage, includes a 'Manage preferences' option for granular control, and meets UK/EU GDPR requirements. (2) A universal affiliate disclosure component that renders at the top of any article or page containing affiliate links — write the exact disclosure copy that satisfies FTC requirements and the TOS of Webflow, Shopify, SEMrush, and PartnerStack simultaneously. (3) A privacy policy template pre-populated for the No-Code Empire network — covering data collected (email, analytics, affiliate clicks), how it's used, third-party processors (Supabase, Resend, Google Analytics, Anthropic API), and user rights. (4) A data processing disclosure for email subscribers shown at signup. (5) A compliance audit checklist to run on each new site before launch. Flag the 5 most common affiliate TOS violations and how to avoid each."},
    ]
  },
  {
    phase:"Phase B — SEO and technical infrastructure",
    items:[
      {n:34,color:"num-teal",cat:"seo",title:"JSON-LD schema system — all page types",what:"Required on every page type. SoftwareApplication, Article, FAQPage, HowTo, BreadcrumbList. Missing schema = leaving rich results on the table.",prompt:"Build the complete JSON-LD structured data system for the No-Code Empire network. Write the exact schema implementations for each page type: (1) Tool review pages — SoftwareApplication schema with name, description, applicationCategory, operatingSystem, offers (pricing), aggregateRating, and author. (2) Article/guide pages — Article schema with headline, author (linked to the site persona's schema.org Person entity), datePublished, dateModified, and publisher. (3) Comparison pages — FAQPage schema built from the comparison's most common questions. (4) Tutorial pages — HowTo schema with all steps, estimated time, and tool requirements. (5) All pages — BreadcrumbList schema reflecting the navigation path. (6) The site persona Person schema that gets referenced across all Article schemas (this is the E-E-A-T anchor). Write each as a reusable JSX/React component that accepts props and outputs the correct script tag. Include the exact props interface for each and how to auto-generate the aggregateRating from Supabase user_ratings data."},
      {n:35,color:"num-teal",cat:"seo",title:"IndexNow + sitemap auto-regeneration",what:"Every new article must ping IndexNow within minutes of publishing. Sitemaps must stay current. Manual sitemap management at 1,200 articles/month is impossible.",prompt:"Build the IndexNow API integration and sitemap auto-regeneration system for the No-Code Empire network. Deliverables: (1) An IndexNow ping function that fires on every successful article publish — accepts the new article URL, sends the IndexNow API request with the correct key and host, logs the response to a indexnow_log Supabase table (url, timestamp, response_status). (2) A sitemap.xml generator that queries the articles, tools, and comparisons tables and outputs a complete sitemap with lastmod dates and priority values (tool reviews: 0.8, comparisons: 0.9, articles: 0.7, homepage: 1.0). The sitemap must support splitting into multiple files if article count exceeds 50,000. (3) A sitemap index file that references all sub-sitemaps. (4) The webhook trigger in the /api/publish-article endpoint that calls both the IndexNow ping and sitemap regeneration functions atomically. (5) A robots.txt template for each platform type. Include the IndexNow key generation process and how to register it with both Google and Bing simultaneously."},
      {n:36,color:"num-teal",cat:"seo",title:"Core Web Vitals optimization pass",what:"LCP <2.5s is required across all 10 sites. Lovable exports often fail this out of the box. One optimization prompt per platform type.",prompt:"Write the Core Web Vitals optimization checklist and implementation guide for each platform used in the No-Code Empire network. For each platform (Lovable/Vite, Webflow, Astro, Framer), provide: (1) The specific LCP optimization steps — image format (WebP), lazy loading implementation, preload directives for above-the-fold images, and font loading strategy that prevents layout shift. (2) The CLS fixes — explicit width/height on all images and embeds, font-display: swap implementation, and how to handle the affiliate CTA sidebar without causing layout shift on scroll. (3) The FID/INP improvements — code splitting for interactive microtool components, deferred loading of non-critical scripts (GA4, cookie banner), and React hydration strategy for Lovable exports. (4) The specific Vercel configuration settings (edge caching, compression, image optimization) that improve scores. (5) A testing protocol using Google PageSpeed API to verify all 10 sites hit LCP <2.5s, FID <100ms, CLS <0.1 before launch. Include the PageSpeed API call used by the CWV Checker microtool."},
      {n:37,color:"num-teal",cat:"seo",title:"E-E-A-T author persona system",what:"Google's trust classification requires discoverable author entities. 10 sites need 10 distinct personas with real web presence.",prompt:"Build the complete E-E-A-T author persona system for all 10 No-Code Empire sites. For each of the 10 sites, create: (1) A named author persona with: full name, professional background (3–4 sentences that are plausible and consistent with the site's niche), headshot prompt for AI image generation (describe the person in enough detail to generate a consistent image across multiple generations), writing style quirks (2–3 specific traits that distinguish this author's voice), and a stated opinion on a controversial topic in the niche. (2) The author bio component for article pages — short version (2 sentences, shown inline) and long version (full bio page at /about/[author-slug]). (3) The Person JSON-LD schema for each author that links to their about page, establishing the entity for Google. (4) A LinkedIn profile outline for each persona — headline, about section, experience section — written to be plausible and indexable. (5) The Supabase authors table schema and how author data gets injected into every Gemini article prompt and every Article JSON-LD schema. Make each persona feel like a genuinely different person, not variations on a template."},
      {n:38,color:"num-teal",cat:"seo",title:"Internal linking architecture — site-level",what:"The cross-site linking rules are defined but the within-site linking structure (which pages link to which) needs a deliberate architecture before content scales.",prompt:"Design the complete internal linking architecture for each of the 10 No-Code Empire sites. For each site, define: (1) The pillar page structure — which 5–8 pages are the topical authority anchors that all other content links up to (e.g. on Site 1: 'Best No-Code App Builders' is a pillar; individual tool reviews are cluster pages that link to it). (2) The hub-and-spoke diagram showing content clusters and their relationships — list the hub topics and the 10–15 spoke article types that support each hub. (3) The linking rules: minimum 2 internal links per article, at least 1 link pointing UP to a pillar page, anchor text variety requirements (keyword / partial match / branded / generic — never more than 30% exact match). (4) The Supabase query Agent 3 should run to find the best internal linking opportunities for any new article — based on topic overlap in the tags array. (5) A link equity flow diagram showing how authority flows from Site 1 (highest authority) through cross-site links to the 9 companion sites. Output the pillar structures for all 10 sites."},
      {n:39,color:"num-teal",cat:"seo",title:"GA4 custom event tracking — full spec",what:"The affiliate_click, quiz_completed, and tool_comparison_used events are how Agent 5 knows what's working. Without these, the monetisation optimizer is blind.",prompt:"Write the complete GA4 custom event tracking implementation for the No-Code Empire network. For each of the 7 required custom events, provide the exact dataLayer.push() code, the GA4 event name, all parameters, and where in the codebase the trigger fires: (1) affiliate_click — fires on every affiliate CTA click, parameters: tool_name, tool_id, article_slug, cta_position (sidebar/inline/bottom), commission_tier. (2) tool_view — fires when a tool card is visible for >3 seconds, parameters: tool_name, tool_id, page_type. (3) email_signup — fires on successful double opt-in confirmation, parameters: source, lead_magnet, goal. (4) tool_comparison_used — fires when a comparison tool returns results, parameters: tool_a, tool_b, winner. (5) quiz_completed — fires on final quiz result, parameters: quiz_name, result, answers_json. (6) checklist_item_checked — fires per checklist interaction, parameters: checklist_type, item_id, progress_pct. (7) sponsored_slot_view — fires when a sponsored listing is in viewport, parameters: tool_name, slot_position, site. Also write the Google Tag Manager container setup for sites using Webflow where direct code injection is limited."},
    ]
  },
  {
    phase:"Phase C — remaining microtools (sites 2–9)",
    items:[
      {n:40,color:"num-blue",cat:"tool",title:"Automation Cost Calculator — Site 2",what:"Compares Zapier vs Make vs n8n vs Pabbly on real task volumes. The highest-intent tool for the automation site.",prompt:"Build the Automation Cost Calculator as a self-contained JSX component for Site 2 (No-Code Automation). Inputs: number of automations (1–50 slider), tasks per month per automation (100–100,000 slider), whether any automations need multi-step logic (yes/no), and whether real-time triggers are needed (yes/no). Output: a side-by-side cost comparison for Zapier Starter/Professional, Make Core/Pro, n8n Cloud Starter/Pro, Pabbly Connect, and Activepieces Cloud — showing monthly cost, tasks included, overage cost per 1,000 tasks, and a 'best for' label. Highlight the cheapest option and the best value at the user's specific volume. Show a break-even chart: at what task volume does each tool become cheaper than Zapier? Include 2025 pricing hardcoded with a last-verified date. Add affiliate CTAs for Make (PartnerStack) and Pabbly under the results. Design: deep purple #7c3aed, Syne headings, DM Sans body."},
      {n:41,color:"num-blue",cat:"tool",title:"Visual Schema Builder — Site 3",what:"Drag-and-drop table builder that outputs Supabase SQL + Airtable structure. The primary reason technical users will bookmark Site 3.",prompt:"Build the Visual Schema Builder as a self-contained JSX component for Site 3 (No-Code Database). The tool lets users build a database schema visually: click 'Add Table', name it, then add fields with name, type (text/number/boolean/date/foreign key/array/JSON), and whether it's required/unique/indexed. Support up to 8 tables and 15 fields per table. Relations: drag from a field to another table to create a foreign key relationship, shown as a connecting line. Output panel (tabs): (1) Supabase SQL — a runnable CREATE TABLE statement with proper PostgreSQL types, constraints, and indexes for each table and relationship. (2) Airtable structure — field names and types translated to Airtable equivalents, with notes where SQL features don't map cleanly. (3) Xano schema — the JSON structure for Xano's API builder. Include a 'Start from template' dropdown with 6 pre-built schemas: blog, ecommerce, SaaS, directory, booking, CRM. Design: deep blue #0369a1, Space Grotesk headings. Use React state for the drag-and-drop — no external DnD library needed for this scope."},
      {n:42,color:"num-blue",cat:"tool",title:"Platform Picker Quiz — Site 4",what:"10-question quiz for ecommerce platform selection. Drives Shopify ($150/referral) and Webflow (50% year 1) affiliate clicks.",prompt:"Build the Platform Picker Quiz for Site 4 (No-Code for Ecommerce) as a self-contained JSX component. 10 questions with animated progress bar: (1) What will you sell — physical products / digital products / services / subscriptions / dropshipping. (2) How many products — under 10 / 10–100 / 100–1,000 / 1,000+. (3) Monthly sales target — just starting / under $5k / $5k–50k / $50k+. (4) Do you need a physical POS — yes / no / maybe later. (5) Technical comfort — none / some / comfortable with code. (6) Budget per month — free only / under $30 / $30–100 / flexible. (7) Need abandoned cart recovery — yes / no / what's that. (8) Need multi-currency — yes / no. (9) Existing website to keep — yes (need to add a store) / no (building fresh). (10) Biggest priority — lowest fees / easiest setup / best design / most features. Score each platform (Shopify, WooCommerce, BigCommerce, Wix, Squarespace, Sellfy, Podia) against each answer using a weighted matrix. Show top 3 results with match percentage, 3 reasons why, and a 'Read full review' CTA with affiliate link. Design: forest green #047857, Nunito Sans, shopping-inspired UI with animated result reveal."},
      {n:43,color:"num-blue",cat:"tool",title:"Prompt Tester — Site 5",what:"Live prompt testing via Gemini API in the browser. The primary traffic magnet for Site 5 — people will share this.",prompt:"Build the Prompt Tester as a self-contained JSX component for Site 5 (No-Code AI Integration). The tool has: a template selector dropdown (customer support reply / content summarizer / data extractor / email writer / product description / SEO meta generator / chatbot response / code explainer), a model selector (Gemini 1.5 Flash / Gemini 1.5 Pro / GPT-4o mini via the Anthropic API as a proxy), a system prompt textarea (pre-filled with the selected template's system prompt, editable), a user message textarea, a temperature slider (0–1), and a max tokens slider (100–2,000). On 'Test prompt', call the Anthropic API with the configured parameters and stream the response into an output panel. Show token count used and estimated cost below the output. Include a 'Save prompt' button that captures the configuration and emails it to the user (POST to /api/add-subscriber with the prompt config as metadata). Include a 'Copy as n8n HTTP node' button that outputs the correct n8n HTTP Request node JSON for the same API call. Maintain a history of the last 5 tests in the session. Design: amber #b45309, Geist font."},
      {n:44,color:"num-blue",cat:"tool",title:"Core Web Vitals Checker — Site 7",what:"Site URL → PageSpeed API → plain-English results with platform-specific fixes. The interactive anchor for the SEO site.",prompt:"Build the Core Web Vitals Checker as a self-contained JSX component for Site 7 (No-Code Analytics & SEO). The user enters a URL and selects their platform (Webflow / Shopify / WordPress / Wix / Squarespace / Framer / Lovable / Other). On submit, call the Google PageSpeed Insights API (v5) and parse the response to display: LCP, FID/INP, CLS, and FCP scores with pass/fail badges (green <threshold, amber near, red fail). For each failing metric, show: what it means in plain English (one sentence), the score vs the threshold, and 3–5 platform-specific fixes drawn from a hardcoded fix database keyed by platform + failing metric. Show a 'Mobile vs Desktop' toggle — run both and display side by side. Below results, show a 'Full SEO setup checklist for [platform]' CTA linking to the SEO Checklist Generator tool. If the PageSpeed API returns an error (private site, timeout), show a graceful fallback with a manual checklist. Design: cyan #0891b2, IBM Plex Sans, data-forward aesthetic."},
      {n:45,color:"num-blue",cat:"tool",title:"SaaS Stack Recommender — Site 8",what:"Business model + feature requirements → complete no-code stack at 3 scale levels with affiliate links. Highest affiliate-click density of any tool.",prompt:"Build the SaaS Stack Recommender as a self-contained JSX component for Site 8 (No-Code for SaaS Founders). Step 1 — inputs: SaaS type (B2B / B2C / marketplace / internal tool), primary features needed (multi-select: user auth / payments / database / CMS / email / analytics / file upload / real-time / API / mobile app), monthly budget, and expected users at launch. Step 2 — output: a recommended stack at 3 scale levels (MVP: $0–50/mo, Growth: $50–300/mo, Scale: $300+/mo). Each stack level shows: the recommended tool for each feature category, monthly cost, why it's recommended for this stage, and a 'Read review' CTA with affiliate link. Stack items include: Bubble or Softr (app builder), Supabase or Xano (backend), Stripe or Lemon Squeezy (payments), Memberstack or Outseta (auth/subscriptions), Resend (email), Plausible (analytics). Highlight which tools have free tiers. Add a total monthly cost at each level. Design: indigo #4338ca, Cabinet Grotesk headings, startup-energy aesthetic with progress stage indicators."},
      {n:46,color:"num-blue",cat:"tool",title:"Font Pairing Tool — Site 9",what:"5 curated font pair recommendations with live Google Fonts preview. Complements the Color Palette Generator as a design toolkit.",prompt:"Build the Font Pairing Tool as a self-contained JSX component for Site 9 (No-Code Design & UI). Inputs: style selector (minimal / bold / editorial / playful / professional / retro), use case (SaaS app / ecommerce / portfolio / blog / agency site / mobile app), and a personality adjective (trustworthy / creative / premium / friendly / authoritative). Output: 5 font pair recommendations, each showing: display/heading font name, body font name, a live preview rendering 'The quick brown fox' in both fonts loaded from Google Fonts API, a sample UI snippet (heading + paragraph + button) rendered in the pair, and a CSS import snippet + CSS variable declarations ready to copy. Include a 'Apply to preview' button that renders a mini landing page skeleton in the selected pair. Each pair recommendation links to the relevant Framer or Webflow tutorial on implementing that pairing. Design: pink accent #be185d, Clash Display headings — the site itself demonstrates the concept. Load Google Fonts dynamically via the Google Fonts CSS API."},
      {n:47,color:"num-blue",cat:"tool",title:"'What Should I Build?' Quiz — Site 10",what:"10-question quiz → top 3 project types with success stories. Primary email capture mechanism for the solopreneur site.",prompt:"Build the 'What Should I Build?' quiz as a self-contained JSX component for Site 10 (No-Code for Solopreneurs). 10 questions: (1) available hours per week (under 5 / 5–15 / 15–30 / 30+), (2) primary skill (writing / design / sales / teaching / coding / organizing), (3) goal (extra income / replace job / build a product / help others), (4) budget to start ($0 / under $100 / $100–500 / flexible), (5) risk tolerance (need income fast / can wait 6 months / long game), (6) prefer working with (people / content / data / products), (7) existing audience (none / small social following / email list / local community), (8) interest area (education / health / business / creative / tech / lifestyle), (9) time horizon for first revenue (1 month / 3 months / 6+ months), (10) biggest fear (technical complexity / finding customers / pricing / time commitment). Score against 12 project types: newsletter, digital course, Notion template shop, SaaS tool, directory site, coaching/consulting, ecommerce, membership community, micro-SaaS, content site, mobile app, local service tool. Show top 3 results with: match percentage, 3 reasons why it fits, real success story example, estimated time to first revenue, and recommended tools with affiliate links. Gate the full results behind email capture — show result 1 free, email required for results 2 and 3. POST to /api/add-subscriber with the result data. Design: emerald #15803d, Nunito headings, friendly encouraging tone, rounded corners, soft progression UI."},

function render2(filterCat){
  const container=document.getElementById('all-prompts2');
  container.innerHTML='';
  prompts2.forEach(phase=>{
    const items=filterCat==='all'?phase.items:phase.items.filter(i=>i.cat===filterCat);
    if(!items.length) return;
    const phaseEl=document.createElement('div');
    phaseEl.className='phase-label';
    phaseEl.textContent=phase.phase;
    container.appendChild(phaseEl);
    items.forEach(item=>{
      const card=document.createElement('div');
      card.className='prompt-card';
      const catLabel={'infra':'Infrastructure','content':'Content','tool':'Microtool','agent':'Agent','revenue':'Revenue','seo':'SEO / Tech','ops':'Operations'}[item.cat]||item.cat;
      const catClass={'infra':'b-infra','content':'b-content','tool':'b-tool','agent':'b-agent','revenue':'b-revenue','seo':'b-seo','ops':'b-ops'}[item.cat]||'b-infra';
      card.innerHTML=`
        <div class="num ${item.color}">${item.n}</div>
        <div>
          <div style="margin-bottom:5px"><span class="badge ${catClass}">${catLabel}</span></div>
          <div class="prompt-title">${item.title}</div>
          <div class="prompt-what">${item.what}</div>
          <div class="prompt-text">${item.prompt.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
        </div>
        <button class="fire-btn" onclick="sendPrompt(prompts2.find(p=>p.items.find(i=>i.n===${item.n})).items.find(i=>i.n===${item.n}).prompt)">Send ↗</button>
      `;
      container.appendChild(card);
    });
  });
}

function filter(cat,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render2(cat);
}

render2('all');
</script>

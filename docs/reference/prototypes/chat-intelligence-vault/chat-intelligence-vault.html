<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Chat Intelligence Vault v1</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
<style>
:root{--bg:#080a0f;--panel:#10141d;--panel2:#161c28;--panel3:#1f2735;--line:rgba(255,255,255,.1);--line2:rgba(255,255,255,.16);--txt:#edf2f7;--muted:#9aa6b8;--faint:#657084;--accent:#ff5b1a;--blue:#61a8ff;--green:#36d17c;--red:#ff5b6a;--yellow:#f3c34d;--r:12px;--mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;--font:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:var(--font);background:radial-gradient(circle at 20% 0%,rgba(255,91,26,.16),transparent 32%),radial-gradient(circle at 80% 10%,rgba(97,168,255,.13),transparent 28%),var(--bg);color:var(--txt);font-size:14px}
button,input,select,textarea{font:inherit}.app{height:100%;display:flex}.side{width:280px;background:rgba(16,20,29,.86);border-right:1px solid var(--line);padding:18px;display:flex;flex-direction:column;gap:16px}.brand{display:flex;gap:12px;align-items:center}.mark{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--accent),#ffb11a);box-shadow:0 16px 45px rgba(255,91,26,.25)}.brand h1{font-size:17px;margin:0}.brand p{font-size:12px;color:var(--muted);margin:3px 0 0}.upload{border:1px dashed var(--line2);border-radius:var(--r);padding:16px;background:rgba(255,255,255,.03);position:relative;color:var(--muted);line-height:1.4}.upload input{position:absolute;inset:0;opacity:0;cursor:pointer}.upload strong{display:block;color:var(--txt);margin-bottom:4px}.nav{display:flex;flex-direction:column;gap:6px}.nav button{border:0;background:transparent;color:var(--muted);text-align:left;padding:11px 12px;border-radius:10px;cursor:pointer;display:flex;justify-content:space-between;gap:8px}.nav button.active,.nav button:hover{background:var(--panel2);color:var(--txt)}.pill{font-size:11px;color:var(--faint);background:rgba(255,255,255,.06);border:1px solid var(--line);padding:2px 7px;border-radius:999px}.main{flex:1;min-width:0;display:flex;flex-direction:column}.top{padding:16px 22px;border-bottom:1px solid var(--line);background:rgba(8,10,15,.65);backdrop-filter:blur(14px);display:flex;justify-content:space-between;gap:14px;align-items:center}.title{font-size:18px;font-weight:800}.subtitle{font-size:12px;color:var(--muted);margin-top:2px}.metrics{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end}.metric{background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:7px 10px;color:var(--muted);font-size:12px}.metric b{color:var(--txt)}.content{display:none;overflow:auto;padding:22px}.content.active{display:block}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.card{background:rgba(16,20,29,.86);border:1px solid var(--line);border-radius:var(--r);padding:16px}.span-3{grid-column:span 3}.span-4{grid-column:span 4}.span-6{grid-column:span 6}.span-8{grid-column:span 8}.span-12{grid-column:span 12}.card h2,.card h3{margin:0 0 10px}.card h2{font-size:18px}.card h3{font-size:14px;color:var(--txt)}.muted{color:var(--muted)}.small{font-size:12px}.list{display:flex;flex-direction:column;gap:10px}.item{border:1px solid var(--line);border-radius:12px;background:var(--panel2);padding:13px}.item-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:8px}.item-title{font-weight:750}.tag{display:inline-block;border:1px solid var(--line2);background:rgba(255,255,255,.05);color:var(--muted);border-radius:999px;padding:3px 8px;font-size:11px;margin:2px}.score{color:var(--green);font-weight:800}.warn{color:var(--yellow)}.bad{color:var(--red)}.controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}.input{background:var(--panel2);border:1px solid var(--line2);border-radius:10px;color:var(--txt);padding:10px 12px;outline:0;min-width:220px;flex:1}.btn{background:var(--panel2);border:1px solid var(--line2);color:var(--txt);border-radius:10px;padding:10px 12px;cursor:pointer}.btn:hover{border-color:var(--accent)}.btn.primary{background:linear-gradient(135deg,var(--accent),#ff8f1a);border-color:transparent;color:white;font-weight:800}.bar{height:9px;background:var(--panel3);border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--green));width:0}.codebox{background:#0b0f16;border:1px solid var(--line2);border-radius:10px;padding:12px;overflow:auto;max-height:380px}pre{margin:0}.story{white-space:pre-wrap;line-height:1.58;color:#c9d2df}.empty{padding:35px;text-align:center;color:var(--faint);border:1px dashed var(--line2);border-radius:var(--r)}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid var(--line);padding:8px;text-align:left;vertical-align:top}th{color:var(--muted);font-size:12px}@media(max-width:920px){.app{flex-direction:column}.side{width:auto}.grid{grid-template-columns:1fr}.span-3,.span-4,.span-6,.span-8,.span-12{grid-column:span 1}.top{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><div class="mark"></div><div><h1>Chat Intelligence Vault</h1><p>Recover projects, code, prompts, stories, and monetizable assets from AI exports.</p></div></div>
    <label class="upload"><strong>Upload export</strong><span id="dropText">ChatGPT/Grok .json or .zip</span><input id="fileInput" type="file" accept=".json,.zip"></label>
    <div class="nav" id="nav"></div>
    <button class="btn" onclick="saveVault()">Save Vault Locally</button>
    <button class="btn" onclick="loadVault()">Load Saved Vault</button>
  </aside>
  <main class="main">
    <div class="top"><div><div class="title" id="mainTitle">Upload an export to begin</div><div class="subtitle" id="mainSub">Everything runs in your browser. No server required.</div></div><div class="metrics" id="metrics"></div></div>
    <section id="dashboard" class="content active"></section>
    <section id="projects" class="content"></section>
    <section id="codebase" class="content"></section>
    <section id="prompts" class="content"></section>
    <section id="stories" class="content"></section>
    <section id="search" class="content"></section>
    <section id="money" class="content"></section>
    <section id="exports" class="content"></section>
  </main>
</div>
<script>
const tabs=[["dashboard","Dashboard"],["projects","Projects"],["codebase","Codebase"],["prompts","Prompt Vault"],["stories","Stories/IP"],["search","Semantic Search"],["money","Monetization"],["exports","Exports"]];
let vault=emptyVault();
function emptyVault(){return{source:"",platform:"unknown",conversations:[],messages:[],code:[],stories:[],prompts:[],commands:[],projects:[],files:[],topics:{},money:[]}}
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function words(s){return [...new Set(String(s||"").toLowerCase().match(/[a-z0-9][a-z0-9-]{2,}/g)||[])].filter(w=>!stop.has(w))}
const stop=new Set("the and for you that with this have are was not but from your can just into like make what when where how all our out has been will would should could about there their they them then than its it's use using used".split(" "));
const projectSeeds=["NoCodeReviewed","Vibe Auditor","Chat Intelligence Vault","Chat Export Extractor","Grok Export Parser","Vibe Code Authority","Prompt Forge","Trellis","Supabase","Lovable","Replit","Bolt","Kimi","Claude","Codex","Gemini","Runway","Humstatic","Soundscapes","Headstone","Asset Factory","Autonomous Asset Creation","No Code Empire"];
const moneyWords=/monetiz|revenue|price|pricing|affiliate|lead|checkout|stripe|gumroad|subscription|monthly|saas|sell|sales|profit|offer|paid|pro plan|customer/i;
const promptWords=/instruction set|system prompt|prompt|gpt builder|claude|codex|kimi|lovable|build spec|terminal commands|delegate/i;
const commandLine=/^\s*(git|npm|pnpm|yarn|node|python|python3|pip|cd|ls|cat|mkdir|touch|cp|mv|rm|grep|find|curl|open|vercel|supabase|brew)\b/m;
const storyWords=/chapter|scene|character|dialogue|plot|story|novel|screenplay|narrative|world|universe|arc|protagonist/i;
document.getElementById("nav").innerHTML=tabs.map((t,i)=>`<button class="${i?'':'active'}" onclick="showTab('${t[0]}',this)"><span>${t[1]}</span><span class="pill" id="pill-${t[0]}">0</span></button>`).join("");
document.getElementById("fileInput").addEventListener("change",e=>e.target.files[0]&&handleFile(e.target.files[0]));
function showTab(id,btn){document.querySelectorAll(".content").forEach(x=>x.classList.remove("active"));document.getElementById(id).classList.add("active");document.querySelectorAll(".nav button").forEach(x=>x.classList.remove("active"));btn&&btn.classList.add("active")}
async function handleFile(file){document.getElementById("dropText").textContent="Processing...";try{let data;if(file.name.toLowerCase().endsWith(".zip")){const zip=await JSZip.loadAsync(file);const candidates=Object.values(zip.files).filter(f=>!f.dir&&/\.json$/i.test(f.name));if(!candidates.length)throw Error("No JSON found in ZIP");candidates.sort((a,b)=>scoreJsonName(b.name)-scoreJsonName(a.name));data=JSON.parse(await candidates[0].async("string"));}else{data=JSON.parse(await file.text())}vault=parseExport(data,file.name);analyzeVault();renderAll();}catch(e){alert("Import failed: "+e.message)}finally{document.getElementById("dropText").textContent="ChatGPT/Grok .json or .zip"}}
function scoreJsonName(n){n=n.toLowerCase();let s=0;if(n.includes("conversation"))s+=5;if(n.includes("grok"))s+=5;if(n.includes("backend"))s+=3;if(n.includes("chat"))s+=2;if(n.includes("billing"))s-=4;if(n.includes("auth"))s-=4;return s}
function parseExport(data,name){const v=emptyVault();v.source=name;if(Array.isArray(data)){v.platform="chatgpt";data.forEach((c,i)=>addChatGPT(v,c,i));}else if(data&&Array.isArray(data.conversations)){v.platform="grok";data.conversations.forEach((c,i)=>addGrok(v,c,i));}else if(data&&data.mapping){v.platform="chatgpt";addChatGPT(v,data,0)}else{v.platform="generic";walkGeneric(v,data)}v.messages=v.conversations.flatMap(c=>c.messages.map(m=>({...m,convo:c.title,convoId:c.id})));return v}
function addChatGPT(v,c,i){const title=c.title||`Conversation ${i+1}`;const arr=[];const mapping=c.mapping||{};Object.values(mapping).forEach(n=>{const m=n.message;if(!m||!m.content)return;let txt="";const parts=m.content.parts;if(Array.isArray(parts))txt=parts.map(p=>typeof p==="string"?p:JSON.stringify(p)).join("\n");else if(typeof m.content.text==="string")txt=m.content.text;if(txt.trim())arr.push({role:m.author?.role||"unknown",time:m.create_time||0,text:txt})});arr.sort((a,b)=>(a.time||0)-(b.time||0));v.conversations.push({id:"c"+v.conversations.length,title,messages:arr})}
function addGrok(v,c,i){const title=c.conversation?.title||c.title||`Grok Conversation ${i+1}`;const arr=[];(c.responses||[]).forEach(r=>{const x=r.response||r;const txt=x.message||x.text||x.content||"";if(String(txt).trim())arr.push({role:x.sender||x.role||"unknown",time:x.createTime||x.createdAt||0,text:String(txt)})});v.conversations.push({id:"c"+v.conversations.length,title,messages:arr})}
function walkGeneric(v,data){const seen=[];(function rec(x){if(!x||typeof x!=="object")return;if(Array.isArray(x)){if(x.some(y=>y&&typeof y==="object"&&(y.message||y.text||y.content))){seen.push(x)}x.forEach(rec)}else Object.values(x).forEach(rec)})(data);seen.slice(0,200).forEach((arr,i)=>v.conversations.push({id:"c"+i,title:`Generic Thread ${i+1}`,messages:arr.map(x=>({role:x.role||x.sender||"unknown",time:x.time||0,text:String(x.message||x.text||x.content||"")})).filter(m=>m.text.trim())}))}
function analyzeVault(){vault.code=[];vault.stories=[];vault.prompts=[];vault.commands=[];vault.projects=[];vault.files=[];vault.topics={};vault.conversations.forEach(c=>{const full=c.messages.map(m=>m.text).join("\n\n");extractCode(c);extractPrompts(c,full);extractStories(c,full);extractCommands(c);words(c.title+" "+full).forEach(w=>vault.topics[w]=(vault.topics[w]||0)+1)});detectProjects();rebuildFiles();scoreMoney()}
function extractCode(c){c.messages.forEach((m,mi)=>{const re=/```([a-zA-Z0-9+#.\-_]*)?\n?([\s\S]*?)```/g;let hit;while((hit=re.exec(m.text))){const lang=(hit[1]||"").trim().toLowerCase();const code=hit[2].trim();if(code.length>5){vault.code.push({id:"code"+vault.code.length,convo:c.title,role:m.role,lang:lang||inferLang(code),code,file:guessFileName(m.text,lang,code,vault.code.length)})}}})}
function inferLang(code){if(/<html|<!doctype/i.test(code))return"html";if(/function |const |let |document\.|=>/.test(code))return"javascript";if(/def |import |print\(|from /.test(code))return"python";if(/SELECT |CREATE TABLE/i.test(code))return"sql";if(/^\s*[{[]/.test(code))return"json";if(/^[.#]?[a-z0-9_-]+\s*\{|\:root/.test(code))return"css";return"unknown"}
function guessFileName(text,lang,code,i){const m=text.match(/(?:file|path|save as|create|update|replace)\s+[`"']?([\w./-]+\.[a-z0-9]+)[`"']?/i)||code.match(/(?:filename|file):\s*([\w./-]+\.[a-z0-9]+)/i);if(m)return m[1];const ext={javascript:"js",js:"js",typescript:"ts",python:"py",html:"html",css:"css",json:"json",sql:"sql",markdown:"md",md:"md"}[lang]||"txt";return`recovered/snippet-${i+1}.${ext}`}
function extractPrompts(c,full){c.messages.forEach(m=>{if(promptWords.test(m.text)&&m.text.length>160)vault.prompts.push({convo:c.title,role:m.role,type:promptType(m.text),text:m.text.slice(0,12000)})})}
function promptType(t){if(/image|thumbnail|logo|hero/i.test(t))return"Image Prompt";if(/codex|terminal|commands/i.test(t))return"Terminal/Codex";if(/gpt builder|instruction set|system prompt/i.test(t))return"GPT Instructions";if(/seo|content|article/i.test(t))return"SEO/Content";return"General Prompt"}
function extractStories(c,full){c.messages.forEach(m=>{const noCode=m.text.replace(/```[\s\S]*?```/g,"");if(noCode.length>700&&(storyWords.test(noCode)||/[“”"]/.test(noCode)))vault.stories.push({convo:c.title,role:m.role,genre:genre(noCode),text:noCode.slice(0,20000)})})}
function genre(t){if(/cyberpunk|neon|ai|robot/i.test(t))return"Sci-Fi";if(/dragon|magic|wizard|enchanted/i.test(t))return"Fantasy";if(/horror|blood|dark|monster/i.test(t))return"Horror";if(/business|startup|money/i.test(t))return"Business Narrative";return"General"}
function extractCommands(c){c.messages.forEach(m=>{const lines=m.text.split("\n").filter(x=>commandLine.test(x));if(lines.length)vault.commands.push({convo:c.title,role:m.role,commands:lines.join("\n")})})}
function detectProjects(){const map={};vault.conversations.forEach(c=>{const full=(c.title+" "+c.messages.map(m=>m.text).join(" ")).slice(0,80000);projectSeeds.forEach(seed=>{if(new RegExp(seed.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"i").test(full)){if(!map[seed])map[seed]={name:seed,conversations:0,code:0,prompts:0,stories:0,summary:"",next:[],score:0};map[seed].conversations++;map[seed].summary=summary(full);}});if(/(?:build|create|make|develop).{0,80}(?:app|tool|site|platform|auditor|engine)/i.test(full)){const name=c.title.replace(/[:|-].*/,"").slice(0,60)||"Untitled Project";if(!map[name])map[name]={name,conversations:0,code:0,prompts:0,stories:0,summary:"",next:[],score:0};map[name].conversations++;map[name].summary=summary(full)}});Object.values(map).forEach(p=>{p.code=vault.code.filter(x=>x.convo.toLowerCase().includes(p.name.toLowerCase())||p.name.toLowerCase().includes(x.convo.toLowerCase())).length;p.prompts=vault.prompts.filter(x=>x.convo.toLowerCase().includes(p.name.toLowerCase())||p.name.toLowerCase().includes(x.convo.toLowerCase())).length;p.stories=vault.stories.filter(x=>x.convo.toLowerCase().includes(p.name.toLowerCase())||p.name.toLowerCase().includes(x.convo.toLowerCase())).length;p.score=Math.min(99,25+p.conversations*8+p.code*10+p.prompts*6+(moneyWords.test(p.summary)?20:0));p.next=nextSteps(p)});vault.projects=Object.values(map).sort((a,b)=>b.score-a.score)}
function summary(t){const s=t.replace(/\s+/g," ").split(/(?<=[.!?])\s+/).filter(x=>x.length>35);return(s.slice(0,2).join(" ")||t.slice(0,220)).slice(0,360)}
function nextSteps(p){const a=[];if(!p.code)a.push("Recover or generate the actual source files.");if(!p.prompts)a.push("Create a build/delegation prompt for Codex, Claude, or Kimi.");if(p.score>60)a.push("Package as a product page with CTA, pricing, and lead capture.");a.push("Export a project brief and hand it to your coding agent.");return a}
function rebuildFiles(){const latest={};vault.code.forEach(c=>{latest[c.file]=c});vault.files=Object.values(latest).sort((a,b)=>a.file.localeCompare(b.file))}
function scoreMoney(){vault.money=vault.projects.map(p=>{let s=p.score+(moneyWords.test(p.summary)?15:0);let path=p.name.match(/auditor|vault|tool|platform|review|nocode/i)?"SaaS/pro tool + affiliate backend":p.name.match(/soundscape|story|prompt/i)?"Digital product + content funnel":"Lead magnet + service upsell";return{...p,moneyScore:Math.min(100,s),path}}).sort((a,b)=>b.moneyScore-a.moneyScore)}
function renderAll(){document.getElementById("mainTitle").textContent="Chat Intelligence Vault v1";document.getElementById("mainSub").textContent=`${vault.source} · ${vault.platform} · ${vault.messages.length} messages analyzed`;renderMetrics();renderDashboard();renderProjects();renderCodebase();renderPrompts();renderStories();renderSearch();renderMoney();renderExports();updatePills()}
function renderMetrics(){const langs=new Set(vault.code.map(x=>x.lang));document.getElementById("metrics").innerHTML=[["Convos",vault.conversations.length],["Messages",vault.messages.length],["Projects",vault.projects.length],["Code",vault.code.length],["Prompts",vault.prompts.length],["Stories",vault.stories.length],["Files",vault.files.length],["Langs",langs.size]].map(x=>`<span class="metric"><b>${x[1]}</b> ${x[0]}</span>`).join("")}
function updatePills(){const data={dashboard:vault.conversations.length,projects:vault.projects.length,codebase:vault.files.length,prompts:vault.prompts.length,stories:vault.stories.length,search:vault.messages.length,money:vault.money.length,exports:8};Object.entries(data).forEach(([k,v])=>{const el=document.getElementById("pill-"+k);if(el)el.textContent=v})}
function renderDashboard(){const top=Object.entries(vault.topics).sort((a,b)=>b[1]-a[1]).slice(0,24).map(([k,v])=>`<span class="tag">${esc(k)} ${v}</span>`).join("");document.getElementById("dashboard").innerHTML=`<div class="grid"><div class="card span-8"><h2>Vault Overview</h2><p class="muted">This import has been converted into searchable assets: detected projects, reconstructed files, reusable prompts, story/IP segments, terminal commands, and monetization opportunities.</p><div class="controls"><button class="btn primary" onclick="showTab('projects',document.querySelector('[onclick*=projects]'))">Review Projects</button><button class="btn" onclick="showTab('codebase',document.querySelector('[onclick*=codebase]'))">Recover Code</button><button class="btn" onclick="exportEverythingMD()">Export Master Brief</button></div></div><div class="card span-4"><h3>Top Topics</h3>${top||'<div class="empty">No topics yet.</div>'}</div><div class="card span-12"><h3>Highest Value Assets</h3>${assetRows()}</div></div>`}
function assetRows(){const rows=[...vault.money.slice(0,5).map(x=>["Project",x.name,x.moneyScore]),...vault.prompts.slice(0,3).map(x=>["Prompt",x.type,60]),...vault.files.slice(0,3).map(x=>["File",x.file,55])];return rows.length?`<table><tr><th>Type</th><th>Asset</th><th>Score</th></tr>${rows.map(r=>`<tr><td>${r[0]}</td><td>${esc(r[1])}</td><td class="score">${r[2]}</td></tr>`).join("")}</table>`:`<div class="empty">Upload an export to see assets.</div>`}
function renderProjects(){document.getElementById("projects").innerHTML=`<div class="controls"><input class="input" id="projectFilter" placeholder="Filter projects..." oninput="renderProjectList()"><button class="btn" onclick="exportProjectsMD()">Export Project Briefs</button></div><div class="list" id="projectList"></div>`;renderProjectList()}
function renderProjectList(){const q=(document.getElementById("projectFilter")?.value||"").toLowerCase();const arr=vault.projects.filter(p=>!q||JSON.stringify(p).toLowerCase().includes(q));document.getElementById("projectList").innerHTML=arr.length?arr.map(p=>`<div class="item"><div class="item-head"><div><div class="item-title">${esc(p.name)}</div><div class="muted small">${esc(p.summary)}</div></div><div class="score">${p.score}/100</div></div><span class="tag">${p.conversations} convos</span><span class="tag">${p.code} code</span><span class="tag">${p.prompts} prompts</span><h3>Next best steps</h3><ol>${p.next.map(x=>`<li>${esc(x)}</li>`).join("")}</ol></div>`).join(""):`<div class="empty">No projects detected.</div>`}
function renderCodebase(){document.getElementById("codebase").innerHTML=`<div class="controls"><input class="input" id="codeFilter" placeholder="Search files/code/language..." oninput="renderFiles()"><button class="btn" onclick="exportCodeZip()">Download Rebuilt ZIP</button><button class="btn" onclick="exportCodeMD()">Export Code Markdown</button></div><div class="list" id="fileList"></div>`;renderFiles()}
function renderFiles(){const q=(document.getElementById("codeFilter")?.value||"").toLowerCase();const arr=vault.files.filter(f=>!q||(f.file+f.lang+f.code).toLowerCase().includes(q));document.getElementById("fileList").innerHTML=arr.length?arr.map(f=>`<div class="item"><div class="item-head"><div><div class="item-title">${esc(f.file)}</div><div class="muted small">${esc(f.convo)} · ${esc(f.lang)}</div></div><button class="btn" onclick="downloadText('${esc(f.id)}')">Download</button></div><pre class="codebox"><code class="language-${esc(f.lang)}">${esc(f.code)}</code></pre></div>`).join(""):`<div class="empty">No code blocks found.</div>`;if(window.hljs)document.querySelectorAll("pre code").forEach(b=>{try{hljs.highlightElement(b)}catch(e){}})}
function renderPrompts(){document.getElementById("prompts").innerHTML=`<div class="controls"><input class="input" id="promptFilter" placeholder="Search prompts..." oninput="renderPromptList()"><button class="btn" onclick="exportPromptsMD()">Export Prompt Vault</button></div><div class="list" id="promptList"></div>`;renderPromptList()}
function renderPromptList(){const q=(document.getElementById("promptFilter")?.value||"").toLowerCase();const arr=vault.prompts.filter(p=>!q||(p.type+p.convo+p.text).toLowerCase().includes(q));document.getElementById("promptList").innerHTML=arr.length?arr.map(p=>`<div class="item"><div class="item-head"><div><div class="item-title">${esc(p.type)}</div><div class="muted small">${esc(p.convo)} · ${esc(p.role)}</div></div></div><div class="story">${esc(p.text.slice(0,1800))}${p.text.length>1800?"...":""}</div></div>`).join(""):`<div class="empty">No prompts detected.</div>`}
function renderStories(){document.getElementById("stories").innerHTML=`<div class="controls"><input class="input" id="storyFilter" placeholder="Search stories/IP..." oninput="renderStoryList()"><button class="btn" onclick="exportStoriesMD()">Export Stories</button></div><div class="list" id="storyList"></div>`;renderStoryList()}
function renderStoryList(){const q=(document.getElementById("storyFilter")?.value||"").toLowerCase();const arr=vault.stories.filter(s=>!q||(s.genre+s.convo+s.text).toLowerCase().includes(q));document.getElementById("storyList").innerHTML=arr.length?arr.map(s=>`<div class="item"><div class="item-head"><div><div class="item-title">${esc(s.genre)} IP Segment</div><div class="muted small">${esc(s.convo)} · ${esc(s.role)}</div></div></div><div class="story">${esc(s.text.slice(0,2200))}${s.text.length>2200?"...":""}</div></div>`).join(""):`<div class="empty">No story/IP segments detected.</div>`}
function renderSearch(){document.getElementById("search").innerHTML=`<div class="card"><h2>Ask/Search Your AI History</h2><div class="controls"><input class="input" id="searchBox" placeholder="Example: find the revenue plan for Vibe Auditor" onkeydown="if(event.key==='Enter')runSearch()"><button class="btn primary" onclick="runSearch()">Search</button></div><div id="searchResults" class="list"></div></div>`}
function runSearch(){const q=document.getElementById("searchBox").value;const qw=words(q);const assets=[...vault.messages.map(m=>({type:"Message",title:m.convo,text:m.text})),...vault.projects.map(p=>({type:"Project",title:p.name,text:p.summary+" "+p.next.join(" ")})),...vault.prompts.map(p=>({type:"Prompt",title:p.type+" · "+p.convo,text:p.text})),...vault.code.map(c=>({type:"Code",title:c.file,text:c.code}))];const res=assets.map(a=>{const aw=words(a.title+" "+a.text);const score=qw.reduce((n,w)=>n+(aw.includes(w)?3:0)+(String(a.text).toLowerCase().includes(w)?1:0),0);return{...a,score}}).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,30);document.getElementById("searchResults").innerHTML=res.length?res.map(r=>`<div class="item"><div class="item-head"><div><div class="item-title">${esc(r.type)} · ${esc(r.title)}</div><div class="muted small">Relevance ${r.score}</div></div></div><div class="story">${esc(r.text.slice(0,1200))}${r.text.length>1200?"...":""}</div></div>`).join(""):`<div class="empty">No matches. Try broader terms.</div>`}
function renderMoney(){document.getElementById("money").innerHTML=`<div class="list">${vault.money.length?vault.money.map(m=>`<div class="item"><div class="item-head"><div><div class="item-title">${esc(m.name)}</div><div class="muted small">${esc(m.path)}</div></div><div class="score">${m.moneyScore}/100</div></div><div class="bar"><i style="width:${m.moneyScore}%"></i></div><p class="muted">${esc(m.summary)}</p><h3>Fastest money move</h3><p>${esc(m.path)}. Create a landing page, capture emails, offer an audit/report/service tier, and convert the best extracted assets into content.</p></div>`).join(""):`<div class="empty">No monetizable projects detected.</div>`}</div>`}
function renderExports(){document.getElementById("exports").innerHTML=`<div class="grid"><div class="card span-6"><h2>Export Everything</h2><p class="muted">Create handoff files for Codex, Claude, Kimi, GitHub, or your website.</p><div class="controls"><button class="btn primary" onclick="exportEverythingMD()">Master Brief MD</button><button class="btn" onclick="exportProjectsMD()">Project Briefs MD</button><button class="btn" onclick="exportPromptsMD()">Prompt Vault MD</button><button class="btn" onclick="exportCodeZip()">Rebuilt Code ZIP</button></div></div><div class="card span-6"><h2>Local Vault</h2><p class="muted">Save the processed vault in browser storage so you can reload it later.</p><div class="controls"><button class="btn" onclick="saveVault()">Save Local</button><button class="btn" onclick="loadVault()">Load Local</button><button class="btn" onclick="downloadJSON()">Download JSON</button></div></div></div>`}
function mdHeader(){return`# Chat Intelligence Vault Export\n\nSource: ${vault.source}\nPlatform: ${vault.platform}\nConversations: ${vault.conversations.length}\nMessages: ${vault.messages.length}\n\n`}
function exportEverythingMD(){let md=mdHeader()+`## Projects\n\n`+vault.projects.map(p=>`### ${p.name}\nScore: ${p.score}/100\n\n${p.summary}\n\nNext:\n${p.next.map(x=>`- ${x}`).join("\n")}\n`).join("\n")+`\n## Prompts\n\n`+vault.prompts.map(p=>`### ${p.type} — ${p.convo}\n\n${p.text}\n`).join("\n")+`\n## Recovered Files\n\n`+vault.files.map(f=>`### ${f.file}\n\n\`\`\`${f.lang}\n${f.code}\n\`\`\`\n`).join("\n");download("chat-intelligence-vault.md",md,"text/markdown")}
function exportProjectsMD(){download("project-briefs.md",mdHeader()+vault.projects.map(p=>`## ${p.name}\nScore: ${p.score}/100\n\n${p.summary}\n\n${p.next.map(x=>`- ${x}`).join("\n")}\n`).join("\n"),"text/markdown")}
function exportPromptsMD(){download("prompt-vault.md",vault.prompts.map(p=>`## ${p.type} — ${p.convo}\n\n${p.text}\n`).join("\n"),"text/markdown")}
function exportStoriesMD(){download("stories-ip.md",vault.stories.map(s=>`## ${s.genre} — ${s.convo}\n\n${s.text}\n`).join("\n"),"text/markdown")}
function exportCodeMD(){download("recovered-code.md",vault.files.map(f=>`## ${f.file}\n\n\`\`\`${f.lang}\n${f.code}\n\`\`\`\n`).join("\n"),"text/markdown")}
async function exportCodeZip(){const zip=new JSZip();vault.files.forEach(f=>zip.file(f.file.replace(/^\/+/,""),f.code));zip.file("README.md",mdHeader()+"Recovered code files generated by Chat Intelligence Vault v1.\n");const blob=await zip.generateAsync({type:"blob"});saveBlob("recovered-codebase.zip",blob)}
function downloadText(id){const f=vault.files.find(x=>x.id===id);if(f)download(f.file.split("/").pop(),f.code,"text/plain")}
function downloadJSON(){download("chat-intelligence-vault.json",JSON.stringify(vault,null,2),"application/json")}
function download(name,text,type){saveBlob(name,new Blob([text],{type}))}
function saveBlob(name,blob){const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function saveVault(){localStorage.setItem("chat-intelligence-vault-v1",JSON.stringify(vault));alert("Vault saved locally in this browser.")}
function loadVault(){const s=localStorage.getItem("chat-intelligence-vault-v1");if(!s)return alert("No saved vault found.");vault=JSON.parse(s);renderAll()}
renderAll();
</script>
</body>
</html>
